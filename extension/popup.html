<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 250px; padding: 16px; background: #0a0a0f; color: #e8e8f0; font-family: sans-serif; }
    h2 { font-size: 16px; color: #ff6b00; margin: 0 0 8px; }
    p { font-size: 12px; color: #888; margin: 4px 0; }
    .status { padding: 8px; background: #111120; border-radius: 8px; margin-top: 8px; font-size: 12px; }
    .connected { border-left: 3px solid #22c55e; }
    .disconnected { border-left: 3px solid #ef4444; }
    input { width: 100%; padding: 6px; background: #111120; border: 1px solid #333; border-radius: 6px; color: #e8e8f0; font-size: 12px; margin-top: 8px; box-sizing: border-box; }
    button { width: 100%; padding: 8px; background: #ff6b00; border: none; border-radius: 6px; color: white; font-weight: 600; cursor: pointer; margin-top: 8px; }
  </style>
</head>
<body>
  <h2>Mount Polumbus HQ</h2>
  <p>Save tweets to your Inspiration Vault or Repurpose queue.</p>
  <div id="status" class="status disconnected">Checking connection...</div>
  <input id="api-url" placeholder="API URL (default: localhost:8505)" />
  <button id="save-btn">Save Settings</button>
  <script>
    const statusEl = document.getElementById("status");
    const urlInput = document.getElementById("api-url");
    
    chrome.storage.local.get("apiBase", (data) => {
      if (data.apiBase) urlInput.value = data.apiBase;
    });

    document.getElementById("save-btn").onclick = () => {
      const url = urlInput.value.trim() || "http://localhost:8505";
      chrome.storage.local.set({ apiBase: url });
      checkConnection(url);
    };

    async function checkConnection(base) {
      try {
        const resp = await fetch((base || "http://localhost:8505") + "/api/health");
        const data = await resp.json();
        if (data.status === "ok") {
          statusEl.textContent = "Connected to HQ";
          statusEl.className = "status connected";
        }
      } catch {
        statusEl.textContent = "Not connected — check URL";
        statusEl.className = "status disconnected";
      }
    }

    chrome.storage.local.get("apiBase", (data) => {
      checkConnection(data.apiBase || "http://localhost:8505");
    });
  </script>
</body>
</html>
